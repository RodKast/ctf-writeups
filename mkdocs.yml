site_name: Write Ups & InfoSec Notes
site_url: https://RodKast.github.io/ctf-writeups
site_description: Penetration testing notes, CTF solutions, and red team exercises.
site_author: RodKast

theme:
  name: material
  logo: assets/fsociety.png
  favicon: assets/fsociety.png
  palette:
    scheme: slate
    primary: black
    accent: deep purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - assets/custom.css

nav:
  - Home: index.md
  - Active Directory:
    - HackSmarter:
      - BuildingMagic: active-directory/hacksmarter/BuildingMagic_WriteUp.md
  - Web:
    - Overview: web/README.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - attr_list
