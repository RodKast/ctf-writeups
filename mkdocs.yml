site_name: RodKast - CTF Write-Ups
site_url: https://RodKast.github.io/ctf-writeups
site_description: Penetration testing notes, CTF solutions, and red team exercises.
site_author: RodKast

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Active Directory:
    - Overview: active-directory/index.md
    - BuildingMagic: active-directory/BuildingMagic_WriteUp.md
  - Web:
    - Overview: web/index.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - attr_list
